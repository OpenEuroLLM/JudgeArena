name: default
description: General-purpose criteria for instruction-following evaluation.
criteria:
  - name: adherence
    description: >-
      Follows the user's instructions and constraints precisely: required
      format, scope, style constraints, and any do/don't requirements.
      Penalize missing requested parts or deviating from constraints.
    score_references:
      5: Fully follows the user's instructions and constraints, including format and scope.
      3: Follows part of the request but misses important constraints or requested parts.
      1: Does not follow the user's request in any meaningful way.
  - name: helpfulness
    description: >-
      Advances the user's goal with relevant, actionable content. Provides
      useful steps, options, or explanations tailored to the request.
      Penalize generic filler or non-responsive content.
    score_references:
      5: Directly solves the user's problem with highly useful, actionable, and relevant content.
      3: Partially helpful but vague, generic, or missing key actionable guidance.
      1: Unhelpful or non-responsive to the user's goal.
  - name: factuality
    description: >-
      Information is correct and appropriately qualified. Avoids hallucinations
      and unwarranted specifics. If uncertain, expresses uncertainty and does
      not fabricate sources, citations, or details.
    score_references:
      5: Accurate and well-qualified throughout, with no fabricated or unsupported claims.
      3: Contains some factual errors, overclaims, or likely hallucinated details.
      1: Largely incorrect, fabricated, or misleading.
  - name: completeness
    description: >-
      Covers the key aspects of the request without major omissions. Addresses
      all sub-questions and important constraints. Penalize partial answers or
      skipped items.
    score_references:
      5: Covers all major parts of the request with no important omissions.
      3: Only partially addresses the request; multiple important pieces are missing.
      1: Fails to address the requested task in a complete or usable way.
  - name: clarity
    description: >-
      Well-organized, easy to follow, and unambiguous. Uses logical structure,
      headings/lists when helpful, and clear references. Penalize confusing
      organization or ambiguity.
    score_references:
      5: Clear, logically structured, and easy to follow with no ambiguity.
      3: Noticeably hard to follow due to weak structure or unclear phrasing.
      1: Confusing, disorganized, or difficult to understand.
  - name: fluency
    description: >-
      Language and presentation quality: grammatical, idiomatic, and natural,
      with precise vocabulary, smooth sentence flow, appropriate concision, and
      clean formatting. Tone suits the user and context.
    score_references:
      5: >-
        Consistently grammatical and idiomatic. Word choice is precise and
        natural, sentences flow smoothly, phrasing reads like a fluent native
        writer. Concise and cleanly formatted with tone well-suited to context.
      3: >-
        Understandable but with noticeable issues: recurring grammar mistakes,
        unidiomatic or stilted phrasing, imprecise word choice, or formatting
        problems that make reading mildly harder.
      1: >-
        Severely disfluent: pervasive grammar errors, broken or unidiomatic
        sentences, wrong vocabulary, or formatting so poor that comprehension
        is substantially harmed.