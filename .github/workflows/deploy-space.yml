name: Deploy leaderboard Space

# Syncs the self-contained Space (app.py + render.py + assemble.py + requirements)
# to a dedicated Hugging Face Space whenever the Space source changes on main.
# Inert until configured: set repo variable HF_SPACE_REPO (e.g. "kbora/judgearena-leaderboard")
# and secret HF_TOKEN (a write token for that Space).

on:
  push:
    branches: [main]
    paths:
      - "space/**"
      - "judgearena/leaderboard/assemble.py"
      - ".github/workflows/deploy-space.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: vars.HF_SPACE_REPO != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install huggingface_hub
        run: pip install "huggingface_hub>=0.24"

      - name: Stage self-contained Space files
        run: |
          mkdir -p _space
          cp space/app.py space/render.py space/requirements.txt _space/
          cp judgearena/leaderboard/assemble.py _space/assemble.py
          if [ -f space/README.md ]; then cp space/README.md _space/README.md; fi

      - name: Upload to the HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import create_repo, upload_folder

          repo = os.environ["HF_SPACE_REPO"]
          token = os.environ["HF_TOKEN"]
          create_repo(repo, repo_type="space", space_sdk="gradio", exist_ok=True, token=token)
          url = upload_folder(
              repo_id=repo,
              repo_type="space",
              folder_path="_space",
              commit_message="Deploy leaderboard Space from JudgeArena main",
              token=token,
          )
          print("Deployed:", url)
          PY
