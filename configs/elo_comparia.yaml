# Example JudgeArena ELO-rating run config.
# Run with:  judgearena --config_path configs/elo_comparia.yaml
# ELO tasks rate a single model (model.name) against arena opponents; the
# arena is derived from the elo-* task, so elo.arena does not need to be set.
task: elo-comparia
model:
  name: Together/meta-llama/Llama-3.3-70B-Instruct-Turbo
judge:
  model: OpenRouter/deepseek/deepseek-chat-v3.1
generation:
  n_instructions: 200
elo:
  n_bootstraps: 20
